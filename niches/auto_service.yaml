business_name: 'АвтоМастер'
business_type: 'services'

product_description: |
  Автосервис "АвтоМастер" — профессиональный ремонт и обслуживание автомобилей.
  ТО, ремонт двигателя, ходовой части, тормозной системы, электрики.

tone: "профессиональный, технически грамотный, уверенный. Обращаемся на 'вы'"

fields_to_collect:
  - name
  - interest
  - budget
  - contact

manager_instructions: |
  - Уточнять марку и модель автомобиля
  - Уточнять год выпуска
  - Предлагать диагностику перед ремонтом

welcome_text: |
  🔧 <b>Добро пожаловать в АвтоМастер!</b>

  Профессиональный ремонт и обслуживание автомобилей любых марок.
  Гарантия на все работы.

  Выберите услугу или задайте вопрос:

