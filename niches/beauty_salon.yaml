business_name: 'Beauty Studio'
business_type: 'services'

product_description: |
  Салон красоты "Beauty Studio" — современный салон с опытными мастерами.
  Стрижки, окрашивание, маникюр, педикюр, макияж, уходовые процедуры.

tone: "дружелюбный, профессиональный, заботливый. Обращаемся на 'вы', но тепло"

fields_to_collect:
  - name
  - interest
  - budget
  - contact

manager_instructions: |
  - Предлагать запись к мастеру
  - Уточнять желаемую дату и время
  - Предлагать комплексные услуги

welcome_text: |
  💅 <b>Добро пожаловать в Beauty Studio!</b>

  Мы предлагаем: стрижки, окрашивание, маникюр, педикюр, макияж, уходовые процедуры.
  Работаем с профессиональной косметикой.

  Выберите услугу или задайте вопрос:

